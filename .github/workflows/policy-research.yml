name: Autonomous policy research

# Triggers:
#   - Daily scan for unhandled issues (off-peak minute to avoid cron bunching)
#   - When a new missing-* issue is filed
#   - Manual run via workflow_dispatch for testing
on:
  schedule:
    - cron: "17 2 * * *"
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Specific issue number to process (leave blank for batch mode)"
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  # Serialise runs so two crons can't try to write the same branch.
  group: policy-research
  cancel-in-progress: false

env:
  MAX_ISSUES_PER_RUN: 10

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet -r .github/scripts/requirements.txt
          pip install --quiet "check-jsonschema>=0.29,<1"

      - name: Configure git
        run: |
          git config user.name  "triplogger-bot"
          git config user.email "triplogger-bot@users.noreply.github.com"

      - name: Pick issues to process
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_NUMBER: ${{ github.event.inputs.issue_number }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_NUMBER" ]; then
            echo "numbers=$INPUT_NUMBER" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$EVENT_NAME" = "issues" ]; then
            LABELS=$(gh issue view "$EVENT_ISSUE_NUMBER" --json labels -q '.labels[].name')
            if echo "$LABELS" | grep -q '^missing-country$' && ! echo "$LABELS" | grep -q '^awaiting-review$'; then
              echo "numbers=$EVENT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            else
              echo "numbers=" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          NUMS=$(gh issue list --state open --label missing-country --json number,labels \
            --jq "[.[] | select(.labels | map(.name) | index(\"awaiting-review\") | not) | .number] | .[:${MAX_ISSUES_PER_RUN}] | join(\",\")")
          echo "numbers=$NUMS" >> "$GITHUB_OUTPUT"

      - name: Research each issue
        if: steps.pick.outputs.numbers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          NUMBERS: ${{ steps.pick.outputs.numbers }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/process_issue.sh
          IFS=',' read -ra NUMS <<< "$NUMBERS"
          for N in "${NUMS[@]}"; do
            [ -z "$N" ] && continue
            ISSUE_NUMBER="$N" .github/scripts/process_issue.sh
          done
