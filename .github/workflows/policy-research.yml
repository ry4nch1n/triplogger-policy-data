name: Autonomous policy research

# Triggers:
#   - Daily scan for unhandled issues (off-peak minute to avoid cron bunching)
#   - When a new missing-* issue is filed
#   - Manual run via workflow_dispatch for testing
on:
  schedule:
    - cron: "17 2 * * *"
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Specific issue number to process (leave blank for batch mode)"
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  # Serialise runs so two crons can't try to write the same branch.
  group: policy-research
  cancel-in-progress: false

env:
  MAX_ISSUES_PER_RUN: 10

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet -r .github/scripts/requirements.txt
          pip install --quiet "check-jsonschema>=0.29,<1"

      - name: Configure git
        run: |
          git config user.name  "triplogger-bot"
          git config user.email "triplogger-bot@users.noreply.github.com"

      - name: Pick issues to process
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.issue_number }}" ]; then
            echo "numbers=${{ github.event.inputs.issue_number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "issues" ]; then
            # Only process if the triggering issue is a missing-country and not already researched
            LABELS=$(gh issue view "${{ github.event.issue.number }}" --json labels -q '.labels[].name')
            if echo "$LABELS" | grep -q '^missing-country$' && ! echo "$LABELS" | grep -q '^awaiting-review$'; then
              echo "numbers=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            else
              echo "numbers=" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          # Scheduled run: batch — list open issues labelled missing-country without awaiting-review
          NUMS=$(gh issue list --state open --label missing-country --json number,labels \
            --jq "[.[] | select(.labels | map(.name) | index(\"awaiting-review\") | not) | .number] | .[:${MAX_ISSUES_PER_RUN}] | join(\",\")")
          echo "numbers=${NUMS}" >> "$GITHUB_OUTPUT"

      - name: Research each issue
        if: steps.pick.outputs.numbers != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          IFS=',' read -ra NUMS <<< "${{ steps.pick.outputs.numbers }}"
          for N in "${NUMS[@]}"; do
            [ -z "$N" ] && continue
            echo "::group::Issue #$N"
            BRANCH="auto-policy/issue-${N}"

            # Skip if branch / PR already exists — avoids duplicate PRs on repeated runs.
            if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
              echo "Branch $BRANCH already exists — skipping."
              echo "::endgroup::"
              continue
            fi

            gh issue view "$N" --json body -q .body > /tmp/issue-body.md
            COUNTRY_CODE=$(awk '/^country_code:/{print $2; exit}' /tmp/issue-body.md)
            COUNTRY_NAME=$(awk '/^country_name:/{sub(/^country_name:[[:space:]]*/, ""); print; exit}' /tmp/issue-body.md)

            git checkout -b "$BRANCH" main

            # Run research script; capture stdout for PR body sources section
            if ! ISSUE_BODY_PATH=/tmp/issue-body.md REPO_ROOT=. \
                 python3 .github/scripts/research.py > /tmp/sources.md 2>/tmp/research.err; then
              echo "Research failed for issue #$N"
              cat /tmp/research.err
              gh issue comment "$N" --body "Auto-research failed. See workflow logs for details.

\`\`\`
$(tail -30 /tmp/research.err)
\`\`\`"
              git checkout main
              git branch -D "$BRANCH" || true
              echo "::endgroup::"
              continue
            fi

            # Local schema validation as a second safety net before commit.
            check-jsonschema --schemafile schema/rule.schema.json "rules/${COUNTRY_CODE}_SG.json"
            check-jsonschema --schemafile schema/document.schema.json "documents/${COUNTRY_CODE}.json"
            check-jsonschema --schemafile schema/manifest.schema.json manifest.json

            git add manifest.json "rules/${COUNTRY_CODE}_SG.json" "documents/${COUNTRY_CODE}.json"
            git commit -m "Auto-research: ${COUNTRY_NAME} (${COUNTRY_CODE})

Generated from issue #${N}."
            git push origin "$BRANCH"

            # Open PR with sources block in the body.
            PR_BODY=$(cat <<EOF
Closes #${N}

Autonomous research run generated policy JSON for **${COUNTRY_NAME}** (\`${COUNTRY_CODE}\`).

Review checklist before merging:

- [ ] Verify \`thresholdDays\` / \`windowDays\` on each rule against cited sources
- [ ] Confirm every \`actionStep.url\` points to an official source (.gov, embassy, CVASC, etc.)
- [ ] Sanity-check the tax residency day counts
- [ ] Check that \`applicableVisaTypes\` scoping is correct

$(cat /tmp/sources.md)

---
_Generated by \`.github/scripts/research.py\` using Claude API. Schema-validated before commit._
EOF
)
            gh pr create --base main --head "$BRANCH" \
              --title "Auto-research: ${COUNTRY_NAME} (${COUNTRY_CODE})" \
              --body "$PR_BODY" \
              --label auto-policy-update

            # Mark issue so future scheduled runs skip it.
            gh issue edit "$N" --add-label awaiting-review
            gh issue comment "$N" --body "Auto-research complete — PR opened for review."

            git checkout main
            echo "::endgroup::"
          done
